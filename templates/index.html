<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IG 退追蹤檢測器 Pro</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; background: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #e1306c; color: white; border: none; cursor: pointer; border-radius: 5px; }
        #loading { display: none; color: #666; margin-top: 10px; text-align: center; }
        #result { margin-top: 20px; white-space: pre-wrap; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>IG退追掃描器</h2>
        <input type="text" id="username" placeholder="Instagram 帳號">
        <input type="password" id="password" placeholder="Instagram 密碼">
        <button onclick="startCheck()">開始掃描</button>
        <div id="loading">正在連線中請稍候... (約 30-60 秒)</div>
        <div id="result"></div>
    </div>

    <script>
        function startCheck() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if (!user || !pass) return alert("請輸入帳密");
            
            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').innerText = '';
            
            sendRequest(user, pass, null);
        }

        function sendRequest(user, pass, code) {
            fetch('/api/check', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass, verification_code: code })
            })
            .then(res => res.json())
            .then(data => {
                if (data.need_2fa) {
                    const userCode = prompt("偵測到雙重驗證！請輸入手機收到的 6 位數代碼：");
                    if (userCode) {
                        sendRequest(user, pass, userCode); // 帶著驗證碼再跑一次
                    } else {
                        document.getElementById('loading').style.display = 'none';
                        alert("已取消驗證");
                    }
                } else if (data.success) {
                    document.getElementById('loading').style.display = 'none';
                    let output = `✅ 掃描完成！\n`;
                    output += `粉絲：${data.stats.followers_count} | 追蹤中：${data.stats.following_count}\n`;
                    output += `❌ 退追蹤的人：${data.unfollowers.join(', ') || '無'}\n`;
                    output += `✨ 新粉絲：${data.new_fans.join(', ') || '無'}`;
                    document.getElementById('result').innerText = output;
                } else {
                    document.getElementById('loading').style.display = 'none';
                    alert("失敗: " + data.message);
                }
            })
            .catch(err => {
                document.getElementById('loading').style.display = 'none';
                alert("伺服器連線超時，請重試。");
            });
        }
    </script>
</body>
</html>
